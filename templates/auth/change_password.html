{% extends "base.html" %}

{% block title %}Change Password – CybExplore Lab{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-primary">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Change Your Password</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Current Password</label>
                        <input type="password" name="old_password" class="form-control form-control-lg" required autofocus placeholder="••••••••">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">New Password</label>
                        <input type="password" name="new_password" class="form-control form-control-lg" required placeholder="••••••••">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Confirm New Password</label>
                        <input type="password" name="confirm_new" class="form-control form-control-lg" required placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        Update Password
                    </button>
                </form>

                <div class="text-center mt-4">
                    <small>
                        <a href="{{ url_for('home') }}" class="text-muted">Back to Home</a>
                    </small>
                </div>
            </div>
        </div>

        
    </div>
</div>
{% endblock %}
